{{- if .Values.opa.enabled }}
{{- if not .Values.opa.bundle.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-policy
  labels:
    {{- include "opa.labels" . | nindent 4 }}
data:
  authz.rego: |
{{ include "opa.policyRego" . | indent 4 }}
{{- end }}
{{- if or .Values.opaPolicy.logDecisions .Values.opa.bundle.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-config
  labels:
    {{- include "opa.labels" . | nindent 4 }}
data:
  opa.yaml: |
{{- if .Values.opa.bundle.enabled }}
{{ include "opa.bundleConfigYaml" . | indent 4 }}
{{- else }}
{{ include "opa.configYaml" . | indent 4 }}
{{- end }}
{{- end }}

{{- if and .Values.opa.simulation.enabled (or .Values.opaPolicy.logDecisions .Values.opa.bundle.enabled) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-simulation-config
  labels:
    {{- include "opaSimulation.labels" . | nindent 4 }}
data:
  opa.yaml: |
{{- if .Values.opa.bundle.enabled }}
{{ include "opa.bundleConfigYaml" (dict "ctx" . "bundleResource" (include "opa.simBundleResource" .)) | indent 4 }}
{{- else }}
{{ include "opa.configYaml" . | indent 4 }}
{{- end }}

{{- end }}

{{- end }}
